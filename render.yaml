services:
  - type: static
    name: the-earth-globe
    buildCommand: npm install && npm run build
    publishPath: ./dist
    headers:
      - path: /*
        headers:
          - key: Cache-Control
            value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
